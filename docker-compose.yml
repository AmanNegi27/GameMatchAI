version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: gamematchai_postgres
    restart: always

    env_file:
      - ./backend/.env

    environment:
      POSTGRES_DB: gamematch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/gamematchai.sql:/docker-entrypoint-initdb.d/01-gamematchai.sql:ro

    networks:
      - gamematchai_network


  backend:
    build:
      context: ./backend

    container_name: gamematchai_backend
    restart: always

    depends_on:
      - postgres

    env_file:
      - ./backend/.env

    ports:
      - "8000:8000"

    networks:
      - gamematchai_network


  frontend:
    build:
      context: ./frontend

    container_name: gamematchai_frontend
    restart: always

    depends_on:
      - backend

    ports:
      - "5173:5173"

    networks:
      - gamematchai_network


volumes:
  postgres_data:


networks:
  gamematchai_network:
    driver: bridge